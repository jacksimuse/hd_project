<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>현대자동차 안전관리 교육 퀴즈</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta property="og:title" content="현대 안전 관리 교육" />
  <meta property="og:description" content="현대자동차 물리보안 캠페인 — 안전관리 교육 퀴즈에 참여해 주세요." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23002C5F'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='20' font-weight='900' fill='white'>H</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face {
      font-family: 'HyundaiSans';
      src: url('./HyundaiSansHeadOffice-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'HyundaiSans';
      src: url('./HyundaiSansHeadOffice-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; line-height: 1.65; }
    body { font-family: 'HyundaiSans', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; background: #F6F6F6; }
    /* 폼 요소는 브라우저 기본 폰트를 사용하므로 명시적으로 강제 적용 */
    input, select, textarea, button, option, ::placeholder {
      font-family: 'HyundaiSans', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif !important;
    }
    /* 굵은 텍스트 전용 Bold 폰트 명시 */
    b, strong,
    .font-bold, .font-semibold, .font-extrabold, .font-black, .font-medium {
      font-family: 'HyundaiSans', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif !important;
      font-weight: bold !important;
    }
    /* 50~60대 사용자 접근성: 전체 폰트 +5px */
    .text-xs   { font-size: 18px !important; }
    .text-sm   { font-size: 20px !important; }
    .text-base { font-size: 22px !important; }
    .text-lg   { font-size: 24px !important; }
    .text-xl   { font-size: 26px !important; }
    .text-2xl  { font-size: 30px !important; }
    .text-3xl  { font-size: 36px !important; }
    .text-4xl  { font-size: 42px !important; }
    .screen-fade { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .pop-in { animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from { opacity: 0; transform: scale(0.85) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .btn-press { transition: transform 0.1s ease, box-shadow 0.1s ease; }
    .btn-press:active { transform: scale(0.96); }
    .progress-bar { transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    ::-webkit-scrollbar { display: none; }
    select { -webkit-appearance: none; appearance: none; line-height: 1.2 !important; padding-top: 10px !important; padding-bottom: 10px !important; height: auto !important; }
    input[type=tel]::-webkit-inner-spin-button,
    input[type=tel]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body class="min-h-screen">

<!-- 로딩 스피너: Tailwind 로드 전 흰 화면 방지 -->
<div id="initial-loader" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F6F6F6;z-index:9999;">
  <div style="width:48px;height:48px;border:4px solid #E5E7EB;border-top-color:#002C5F;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  <p style="margin-top:14px;font-family:'Malgun Gothic',sans-serif;font-size:13px;color:#6B7280;">잠시만 기다려 주세요...</p>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div id="app" class="max-w-md mx-auto min-h-screen bg-white relative shadow-lg"></div>

<script>
// ─────────────────────────────────────────────
// SOUND EFFECTS
// ─────────────────────────────────────────────
const sfxQuestion = new Audio('./%23txt_point_Positive.mp3');
const sfxPopup    = new Audio('./SCH - Button - 1.mp3');

// ─────────────────────────────────────────────
// QUIZ DATA
// ─────────────────────────────────────────────
const QUIZ_SETS = {
  1: [
    {
      type: 'ox',
      question: '급한 업무 처리이기 때문에 자재를 10분 정도 반출하는 것은 반출증 작성이 필요 없다.',
      answer: 'X',
      explanation: '아무리 급한 업무 처리라고 하더라도, 사내에서 자산을 반출할 경우에는 출입보안시스템으로 반출 승인을 받아야 합니다.'
    },
    {
      type: 'multiple',
      question: '사내에 위장막이 씌워져 있는 차량이 방치되어 있을 때 적절한 행동은 무엇인가요?',
      options: ['위장막을 살짝 걷어본다', '신기하니까 사진을 찍어 외부에 공유한다', '다른 사람 몰래 탑승해본다', '관리부서에 제보한다'],
      answer: 3,
      explanation: '위장막이 씌워져 있는 차량은 신차이기 때문에 신차와 관련된 일체의 정보(디자인 / 생산일정 / 차량가격 / 특성 등)는 비밀로 관리되어야 합니다.'
    }
  ],
  2: [
    {
      type: 'ox',
      question: '사내에서 사진을 촬영하는 것은 가능하다.',
      answer: 'X',
      explanation: '원칙적으로 사내에서 촬영을 하여서는 안됩니다. 불가피하게 업무상 촬영이 꼭 필요한 경우라면, 소속 부서의 부서장 승인을 득한 후 각 사업장 보안관련 부서에 촬영 프로세스를 문의해야 합니다.'
    },
    {
      type: 'sequence',
      question: '회사 자산을 사외로 반출할 경우, 자산반출 프로세스를 순서에 맞게 나열해 주세요.',
      items: ['출입보안시스템 접속', '반출증 작성', '반출결재'],
      answer: [0, 1, 2],
      explanation: '자산반출 프로세스: ① 출입보안시스템 접속 → ② 반출증 작성 → ③ 반출결재'
    }
  ],
  3: [
    {
      type: 'sequence',
      question: '업무 목적상 방문객 출입이 필요할 경우, 방문객 출입 절차를 순서대로 나열해 주세요.',
      items: ['출입예약시스템 접속', '피방문자 승인', '방문객센터 방문', '반입 물품 확인 및 방문 접수'],
      answer: [0, 1, 2, 3],
      explanation: '방문객 출입 절차: ① 출입예약시스템 접속 → ② 피방문자 승인 → ③ 방문객센터 방문 → ④ 반입 물품 확인 및 방문 접수'
    },
    {
      type: 'ox',
      question: '방문신청을 해서 사내에 출입한 방문객은 임직원 동행이 필요하지 않다.',
      answer: 'X',
      explanation: '방문 신청이 완료된 방문객이라 하더라도, 출입 승인이 허가된 구역만 출입이 가능하기에 사내에서는 항상 피방문자와 동행해야 합니다.'
    }
  ]
};

const LOCATIONS = ['울산공장', '아산공장', '전주공장', '남양연구소'];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const state = {
  screen: 'entry',
  set: 1,
  forcedSet: null,
  location: '',
  team: '',
  startAttempted: false,
  currentQ: 0,
  seqSelected: [],
  seqShuffled: null,
  popup: null, // { isCorrect, explanation, isLast }
  survey: {
    q1: null, q2: '', q3: null, q4: '',
    q5: null, q6: null, q7: '', q8: '',
    name: '', phone2: '', phone3: ''
  }
};

// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const SCALE_LABELS = {
  q1: ['매우 불만족','불만족','보통','만족','매우 만족'],
  q5: ['매우 낮음','낮음','보통','높음','매우 높음'],
  q6: ['매우 낮음','낮음','보통','높음','매우 높음'],
};

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function h(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
let _prevScreen = null;
function render() {
  const app = document.getElementById('app');
  const animate = _prevScreen !== state.screen;
  _prevScreen = state.screen;
  if (state.screen === 'entry')    app.innerHTML = renderEntry(animate);
  else if (state.screen === 'quiz') {
    app.innerHTML = renderQuiz(animate);
    if (!state.popup) { sfxQuestion.currentTime = 0; sfxQuestion.play().catch(() => {}); }
  }
  else if (state.screen === 'survey')   app.innerHTML = renderSurvey(animate);
  else if (state.screen === 'complete') app.innerHTML = renderComplete(animate);
}

// ─────────────────────────────────────────────
// SCREEN 1 — ENTRY
// ─────────────────────────────────────────────
function renderEntry(animate = true) {
  const canStart = state.location && state.team.trim();
  return `
<div class="flex flex-col min-h-screen${animate ? ' screen-fade' : ''}">

  <!-- Header -->
  <div style="background:#002C5F" class="px-6 pt-10 pb-8 text-white">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center shadow-md">
        <img src="./KakaoTalk_20260317_203648435_01.png" class="w-9 h-7 object-contain">
      </div>
      <div>
        <p class="text-xs font-semibold tracking-widest opacity-60">HYUNDAI MOTOR</p>
        <p class="text-sm font-bold opacity-90" style="line-height: 1.5;">물리보안 캠페인</p>
      </div>
    </div>
    <h1 class="text-3xl font-black leading-tight">안전 관리<br>교육 퀴즈</h1>
  </div>

  <!-- Body -->
  <div class="flex-1 px-5 py-6">
    <div class="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-6 flex flex-col items-center text-center gap-1">
      <span class="text-lg">📋</span>
      <p class="text-sm text-blue-800 font-medium leading-relaxed">퀴즈 시작 전 아래 정보를 입력해 주세요.</p>
    </div>

    <!-- 소속 -->
    <div class="mb-5">
      <label class="block text-sm font-bold text-gray-700 mb-2">
        소속 <span class="text-red-500">*</span>
      </label>
      <div class="relative">
        <select id="location-select"
          onchange="state.location=this.value; updateEntry()"
          class="w-full border-2 rounded-2xl px-4 text-sm bg-white focus:outline-none transition-colors pr-10
            ${state.location ? 'border-blue-500 text-gray-800' : 'border-gray-200 text-gray-400'}">
          <option value="">소속을 선택하세요</option>
          ${LOCATIONS.map(l => `<option value="${l}" ${state.location===l?'selected':''}>${l}</option>`).join('')}
        </select>
        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-xs">▼</span>
      </div>
    </div>

    <!-- 팀 -->
    <div class="mb-8">
      <label class="block text-sm font-bold text-gray-700 mb-2">
        팀 <span class="text-red-500">*</span>
      </label>
      <input id="team-input" type="text" placeholder="팀 이름을 입력하세요"
        value="${h(state.team)}"
        oninput="state.team=this.value; updateEntry()"
        class="w-full border-2 rounded-2xl px-4 py-3.5 text-sm focus:outline-none transition-colors
          ${state.team ? 'border-blue-500 text-gray-800' : 'border-gray-200 text-gray-500'}" />
    </div>

    <!-- Guide -->
    <div class="rounded-2xl bg-gray-50 p-4 space-y-1.5">
      <p class="text-xs text-gray-500 flex items-start gap-1.5"><span>·</span><span>퀴즈는 총 <strong>2문제</strong>로 구성됩니다.</span></p>
      <p class="text-xs text-gray-500 flex items-start gap-1.5"><span>·</span><span>정답 여부와 관계없이 바로 해설을 확인할 수 있습니다.</span></p>
      <p class="text-xs text-gray-500 flex items-start gap-1.5"><span>·</span><span>퀴즈 완료 후 설문조사가 진행됩니다.</span></p>
    </div>
  </div>

  <!-- CTA -->
  <div class="px-5 pb-10">
    <div id="entry-validation-msg" class="mb-3" style="display:${state.startAttempted && !canStart ? 'block' : 'none'}">
      <p class="text-sm text-red-500 font-semibold text-center">
        ${!state.location && !state.team.trim() ? '공장과 소속을 입력하세요' :
          !state.location ? '공장을 선택해주세요' : '소속을 입력해주세요'}
      </p>
    </div>
    <button id="start-btn" onclick="handleStart()"
      style="${canStart ? 'background:#002C5F' : 'background:#D1D5DB'}"
      class="btn-press w-full text-white py-4 rounded-2xl text-base font-bold shadow-lg">
      퀴즈 시작하기
    </button>
  </div>
</div>`;
}

function updateEntry() {
  const canStart = !!(state.location && state.team.trim());
  const btn = document.getElementById('start-btn');
  if (btn) btn.style.background = canStart ? '#002C5F' : '#D1D5DB';
  const sel = document.getElementById('location-select');
  if (sel) {
    sel.style.borderColor = state.location ? '#3b82f6' : '#e5e7eb';
    sel.style.color = state.location ? '#1f2937' : '#9ca3af';
  }
  const inp = document.getElementById('team-input');
  if (inp) {
    inp.style.borderColor = state.team ? '#3b82f6' : '#e5e7eb';
    inp.style.color = state.team ? '#1f2937' : '#6b7280';
  }
  if (state.startAttempted) {
    const msg = document.getElementById('entry-validation-msg');
    if (msg) {
      if (!canStart) {
        const text = !state.location && !state.team.trim() ? '공장과 소속을 입력하세요'
          : !state.location ? '공장을 선택해주세요' : '소속을 입력해주세요';
        msg.querySelector('p').textContent = text;
        msg.style.display = 'block';
      } else {
        msg.style.display = 'none';
      }
    }
  }
}

function handleStart() {
  state.startAttempted = true;
  if (!state.location || !state.team.trim()) { render(); return; }
  if (state.forcedSet) {
    state.set = state.forcedSet;
  } else {
    const availableSets = state.location === '아산공장' ? [1, 2] : [1, 2, 3];
    state.set = availableSets[Math.floor(Math.random() * availableSets.length)];
  }
  state.currentQ = 0;
  state.seqSelected = [];
  state.seqShuffled = null;
  state.screen = 'quiz';
  render();
}

// ─────────────────────────────────────────────
// SCREEN 2 — QUIZ
// ─────────────────────────────────────────────
function renderQuiz(animate = true) {
  const qs = QUIZ_SETS[state.set];
  const qi = state.currentQ;
  const q = qs[qi];
  const pct = (qi / qs.length) * 100;

  // Initialize shuffle once per question
  if (q.type === 'sequence' && !state.seqShuffled) {
    state.seqShuffled = shuffle([...Array(q.items.length).keys()]);
  }

  const allSeqDone = q.type === 'sequence' && state.seqSelected.length === q.items.length;

  return `
<div class="flex flex-col min-h-screen${animate ? ' screen-fade' : ''}">

  <!-- Header -->
  <div style="background:#002C5F" class="px-5 pt-7 pb-5 text-white">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 bg-white rounded-lg flex items-center justify-center">
          <img src="./KakaoTalk_20260317_203648435_01.png" class="w-5 h-4 object-contain">
        </div>
        <span class="text-sm font-bold opacity-80">안전관리 교육 퀴즈 · SET ${state.set}</span>
      </div>
      <span class="text-sm font-bold opacity-70">${qi + 1} / ${qs.length}</span>
    </div>
    <!-- Progress -->
    <div class="w-full h-2 rounded-full" style="background:rgba(255,255,255,0.2)">
      <div class="h-2 rounded-full bg-white progress-bar" style="width:${pct}%"></div>
    </div>
  </div>

  <!-- Question Body -->
  <div class="flex-1 px-5 py-6 overflow-y-auto">
    <div class="mb-3">
      <span class="inline-block text-xs font-bold px-3 py-1 rounded-full
        ${q.type==='ox' ? 'bg-blue-100 text-blue-700' : q.type==='multiple' ? 'bg-purple-100 text-purple-700' : 'bg-amber-100 text-amber-700'}">
        ${q.type==='ox' ? 'O / X 문제' : q.type==='multiple' ? '객관식' : '순서 맞추기'}
      </span>
    </div>
    <p class="text-base font-bold text-gray-800 leading-relaxed mb-6">Q${qi+1}. ${q.question}</p>

    ${q.type === 'ox' ? renderOX(qi) : ''}
    ${q.type === 'multiple' ? renderMultiple(q, qi) : ''}
    ${q.type === 'sequence' ? renderSequence(q) : ''}
  </div>

  <!-- Sequence Submit Button -->
  ${q.type === 'sequence' ? `
  <div class="px-5 pb-10">
    <button id="seq-submit-btn" onclick="handleSeqSubmit(${qi})"
      style="${allSeqDone ? 'background:#002C5F' : 'background:#D1D5DB'}"
      class="btn-press w-full text-white py-4 rounded-2xl text-base font-bold shadow-lg">
      정답 확인하기
    </button>
  </div>` : ''}

</div>

${state.popup ? renderPopup() : ''}`;
}

function renderOX(qi) {
  return `
<div class="grid grid-cols-2 gap-4">
  <button onclick="handleOX('O',${qi})"
    class="btn-press h-32 rounded-2xl text-6xl font-black shadow-md border-2 border-blue-100 bg-blue-50 text-blue-500 hover:bg-blue-100 transition-colors">
    O
  </button>
  <button onclick="handleOX('X',${qi})"
    class="btn-press h-32 rounded-2xl text-6xl font-black shadow-md border-2 border-red-100 bg-red-50 text-red-400 hover:bg-red-100 transition-colors">
    X
  </button>
</div>`;
}

function renderMultiple(q, qi) {
  const nums = ['①','②','③','④'];
  return `
<div class="flex flex-col gap-3">
  ${q.options.map((opt, i) => `
  <button onclick="handleMultiple(${i},${qi})"
    class="btn-press text-left px-4 py-4 rounded-2xl border-2 border-gray-200 bg-white shadow-sm hover:border-blue-300 hover:bg-blue-50 transition-all flex items-center gap-3">
    <span class="w-8 h-8 rounded-full bg-gray-100 text-center text-sm font-bold text-gray-600 flex-shrink-0 flex items-center justify-center">
      ${nums[i]}
    </span>
    <span class="text-sm text-gray-700 leading-relaxed">${opt}</span>
  </button>`).join('')}
</div>`;
}

function renderSeqItems(q) {
  return state.seqShuffled.map(idx => {
    const selOrder = state.seqSelected.indexOf(idx);
    const isSel = selOrder !== -1;
    return `
    <button onclick="handleSeqClick(${idx})"
      class="btn-press text-left px-4 py-4 rounded-2xl border-2 shadow-sm transition-all flex items-center gap-3
        ${isSel ? 'border-blue-500 bg-blue-50' : 'border-gray-200 bg-white hover:border-blue-300'}">
      <span class="w-9 h-9 rounded-xl flex items-center justify-center text-sm font-black flex-shrink-0 transition-all
        ${isSel ? 'text-white' : 'bg-gray-100 text-gray-400'}"
        style="${isSel ? 'background:#002C5F' : ''}">
        ${isSel ? selOrder + 1 : '?'}
      </span>
      <span class="text-sm font-medium ${isSel ? 'text-blue-800' : 'text-gray-700'}">${q.items[idx]}</span>
    </button>`;
  }).join('');
}

function renderSequence(q) {
  return `
<div>
  <p class="text-xs text-gray-400 mb-4 leading-relaxed">항목을 올바른 순서대로 클릭하세요.<br>선택한 항목을 다시 클릭하면 선택이 취소됩니다.</p>
  <div id="seq-list" class="flex flex-col gap-3">
    ${renderSeqItems(q)}
  </div>
</div>`;
}

function handleOX(sel, qi) {
  const q = QUIZ_SETS[state.set][qi];
  openPopup(sel === q.answer, q.explanation, qi);
}

function handleMultiple(idx, qi) {
  const q = QUIZ_SETS[state.set][qi];
  openPopup(idx === q.answer, q.explanation, qi);
}

function handleSeqClick(idx) {
  const pos = state.seqSelected.indexOf(idx);
  if (pos !== -1) state.seqSelected.splice(pos, 1);
  else state.seqSelected.push(idx);
  const q = QUIZ_SETS[state.set][state.currentQ];
  const listEl = document.getElementById('seq-list');
  if (listEl) listEl.innerHTML = renderSeqItems(q);
  const allDone = state.seqSelected.length === q.items.length;
  const btn = document.getElementById('seq-submit-btn');
  if (btn) btn.style.background = allDone ? '#002C5F' : '#D1D5DB';
}

function handleSeqSubmit(qi) {
  const q = QUIZ_SETS[state.set][qi];
  const correct = JSON.stringify(state.seqSelected) === JSON.stringify(q.answer);
  openPopup(correct, q.explanation, qi);
}

// ─────────────────────────────────────────────
// POPUP
// ─────────────────────────────────────────────
function openPopup(isCorrect, explanation, qi) {
  const isLast = qi >= QUIZ_SETS[state.set].length - 1;
  state.popup = { isCorrect, explanation, isLast };
  sfxPopup.currentTime = 0; sfxPopup.play().catch(() => {});
  render();
}

function renderPopup() {
  const { isCorrect, explanation, isLast } = state.popup;
  const color = isCorrect ? '#16a34a' : '#dc2626';
  const bgColor = isCorrect ? '#f0fdf4' : '#fef2f2';
  return `
<div class="fixed inset-0 z-50 flex items-end justify-center px-4 pb-6" style="background:rgba(0,0,0,0.55)">
  <div class="pop-in w-full max-w-md bg-white rounded-3xl overflow-hidden shadow-2xl">

    <!-- Top band -->
    <div class="px-6 pt-6 pb-5" style="background:${bgColor}">
      <div class="flex items-center gap-4">
        <!-- Owl -->
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0 overflow-hidden"
          style="background:${isCorrect ? '#dcfce7' : '#fee2e2'}">
          <img src="owl.png" alt="부엉이" class="w-14 h-14 object-contain"
            onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <span style="display:none;font-size:2.2rem">${isCorrect ? '🦉' : '🦉'}</span>
        </div>
        <div>
          <p class="text-xs font-bold uppercase tracking-wider mb-0.5" style="color:${color}">
            ${isCorrect ? '정답' : '오답'}
          </p>
          <p class="text-xl font-black" style="color:${color}">
            ${isCorrect ? '정답입니다! 🎉' : '아쉽네요! 😢'}
          </p>
        </div>
      </div>
    </div>

    <!-- Explanation -->
    <div class="px-6 py-5">
      <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">📖 해설</p>
      <p class="text-sm text-gray-700 leading-relaxed">${explanation}</p>
    </div>

    <!-- Button -->
    <div class="px-6 pb-6">
      <button onclick="closePopup()"
        style="background:#002C5F"
        class="btn-press w-full text-white py-4 rounded-2xl text-base font-bold shadow-lg">
        ${isLast ? '설문조사로 이동 →' : '다음 문제로 →'}
      </button>
    </div>
  </div>
</div>`;
}

function closePopup() {
  const { isLast } = state.popup;
  state.popup = null;
  state.seqSelected = [];
  state.seqShuffled = null;
  if (isLast) {
    state.screen = 'survey';
  } else {
    state.currentQ++;
  }
  render();
}

function renderScale(fieldId, value, labels) {
  return `
<div id="scale-${fieldId}">
  <div class="flex justify-between text-xs text-gray-400 mb-2 px-0.5">
    <span>${labels[0]}</span><span>${labels[4]}</span>
  </div>
  <div class="flex gap-2">
    ${[1,2,3,4,5].map(n => `
    <button onclick="selectScale('${fieldId}', ${n})"
      class="btn-press flex-1 py-3 rounded-xl text-sm font-bold border-2 transition-all
        ${value===n ? 'text-white border-transparent shadow-md' : 'border-gray-200 text-gray-500 bg-white'}"
      style="${value===n ? 'background:#002C5F' : ''}">
      ${n}
    </button>`).join('')}
  </div>
  <p id="scale-label-${fieldId}" class="text-center text-xs font-semibold mt-2" style="color:#007FA8; ${value ? '' : 'display:none'}">${value ? labels[value-1] : ''}</p>
</div>`;
}

function selectBooth(i) {
  state.survey.q3 = i;
  const container = document.getElementById('booth-group');
  if (!container) return;
  container.querySelectorAll('button').forEach((btn, idx) => {
    const sel = idx === i;
    btn.className = `btn-press text-left px-4 py-3.5 rounded-xl border-2 text-sm transition-all flex items-center gap-2 ${sel ? 'border-blue-500 bg-blue-50 text-blue-800 font-semibold' : 'border-gray-200 text-gray-700 bg-white'}`;
  });
}

function selectScale(fieldId, value) {
  state.survey[fieldId] = value;
  const labels = SCALE_LABELS[fieldId];
  const container = document.getElementById('scale-' + fieldId);
  if (!container) return;
  container.querySelectorAll('button').forEach((btn, i) => {
    const sel = (i + 1) === value;
    btn.style.background = sel ? '#002C5F' : '';
    btn.className = `btn-press flex-1 py-3 rounded-xl text-sm font-bold border-2 transition-all ${sel ? 'text-white border-transparent shadow-md' : 'border-gray-200 text-gray-500 bg-white'}`;
  });
  const labelEl = document.getElementById('scale-label-' + fieldId);
  if (labelEl) { labelEl.textContent = labels[value - 1]; labelEl.style.display = 'block'; }
}

function handleSubmit() {
  const sv = state.survey;
  if (sv.q1 === null || sv.q3 === null || sv.q5 === null || sv.q6 === null) {
    const el = document.getElementById('err-msg');
    if (el) { el.style.display = 'block'; }
    window.scrollTo(0, document.body.scrollHeight);
    return;
  }
  state.screen = 'complete';
  render();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
(function init() {
  const params = new URLSearchParams(window.location.search);
  const setParam = parseInt(params.get('set'), 10);
  if (setParam >= 1 && setParam <= 3) {
    state.forcedSet = setParam;
  }
  render();
  const loader = document.getElementById('initial-loader');
  if (loader) loader.remove();
})();
</script>
